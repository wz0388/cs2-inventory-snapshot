<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f6fa;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            border: 1px solid #e9edf2;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #1e293b;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .message {
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e2f;
            background: #fef8e7;
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border-left: 4px solid #f97316;
            text-align: left;
        }

        .btn-refresh {
            background: #f97316;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.75rem 1.8rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-refresh:hover {
            background: #ea580c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="message">
            ⏳ 如果确认资源存在请等待1分钟使cloudflare可以完成自动部署
        </div>
        <button class="btn-refresh" id="reloadBtn">⟳ 刷新页面</button>
    </div>

    <script>
        document.getElementById('reloadBtn').addEventListener('click', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
