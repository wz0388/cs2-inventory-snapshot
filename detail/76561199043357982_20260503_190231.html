        .item-card {

            border-radius: 4px;
            padding: 15px;

            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }
        .rarity-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            border-radius: 4px 4px 0 0;
        }
        .item-img-container {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            margin-bottom: 10px;
        }
        .item-img {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
        .item-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }
        .item-type {
            font-size: 12px;
            color: #8b929a;
            margin-bottom: 10px;
        }
        .item-meta {
            margin-top: auto;
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        .wear-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 2px;
            background: rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }
        .float-val {
            color: #57cbff;
            font-family: monospace;
        }
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
        }
        .tag {
            background: #3d4448;
            color: #fff;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 2px;
        }
