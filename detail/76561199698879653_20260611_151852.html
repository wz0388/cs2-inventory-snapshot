<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 库存快照</title>
    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-blue: #2a475e;
            --steam-text: #c7d5e0;
            --rarity-rare: #4b69ff;
            --rarity-mythical: #8847ff;
            --rarity-legendary: #d32ce6;
            --rarity-ancient: #eb4b4b;
            --rarity-common: #b0c3d9;
        }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--steam-dark);
            color: var(--steam-text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--steam-blue);
            padding-bottom: 20px;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            max-width: 1500px;
            margin: 0 auto;
        }
        .item-card {
            background: linear-gradient(135deg, #2a475e 0%, #16202d 100%);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }
        .rarity-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            border-radius: 4px 4px 0 0;
        }
        .item-img-container {
            height: 160px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            margin-bottom: 10px;
        }
        .item-img {
            max-width: 100%; max-height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
        .item-name {
            font-size: 14px; font-weight: bold; margin-bottom: 5px;
            line-height: 1.4; min-height: 40px; overflow: hidden;
        }
        .item-type {
            font-size: 12px; color: #8b929a; margin-bottom: 8px;
        }
        .item-meta {
            margin-top: auto; font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;
        }
        .wear-badge {
            display: inline-block; padding: 2px 6px; border-radius: 2px;
            background: rgba(0,0,0,0.3); margin-bottom: 4px;
        }
        .float-val {
            color: #57cbff; font-family: monospace;
        }
        .price-val {
            color: #a5d6a5; font-weight: bold; margin-top: 4px;
        }
        .tag-container {
            display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px;
        }
        .tag {
            background: #3d4448; color: #fff; padding: 1px 4px;
            font-size: 10px; border-radius: 2px;
        }
        .merge-btn {
            margin: 5px; padding: 6px 12px;
            background: #4b69ff; color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px;
        }
        .merge-btn:hover { background: #3a53cc; }
        select {
            padding: 6px 12px; border-radius: 4px; border: none;
            background: #2a475e; color: white; font-size: 14px;
            margin: 0 4px;
        }
        label { font-size: 14px; margin: 0 2px; }
        #total-value { font-size: 18px; color: #ffd700; }
    </style>
</head>

": "2025年奥斯汀锦标赛选手亲笔签名"}], "sealed": 0, "market_bucket_group_name": "印花 | jottAAA（全息）| 2025年奥斯汀锦标赛", "market_bucket_group_id": "G18B90930046205080010E944", "sealed_type": 0, "market_name_inside_group": "印花"}], "asset_properties": []};
    const IMG_BASE = "https://community.cloudflare.steamstatic.com/economy/image/";

    // 磨损等级判定
    function getWearLabel(f) {
        const float = parseFloat(f);
        if (isNaN(float)) return null;
        if (float < 0.07) return "崭新出厂 (WearCategory0)";
        if (float < 0.15) return "略有磨损 (WearCategory1)";
        if (float < 0.38) return "久经沙场 (WearCategory2)";
        if (float < 0.45) return "破损不堪 (WearCategory3)";
        return "战痕累累 (WearCategory4)";
    }

    function extractWearFromName(detail) {
        if (!detail) return null;
        const name = detail.market_name || detail.market_hash_name || '';
        const match = name.match(/\(([^)]+)\)$/);
        if (match && match[1]) {
            const raw = match[1].trim();
            if (/[\u4e00-\u9fa5]/.test(raw)) return raw;
            const wearMapEN = {
                'Factory New': '崭新出厂',
                'Minimal Wear': '略有磨损',
                'Field-Tested': '久经沙场',
                'Well-Worn': '破损不堪',
                'Battle-Scarred': '战痕累累'
            };
            if (wearMapEN[raw]) return wearMapEN[raw];
            const stMatch = name.match(/StatTrak™\s*(.*)/);
            if (stMatch) return extractWearFromName({ market_name: stMatch[1] });
        }
        return null;
    }

    function parseType(fullType) {
        if (!fullType) return { rarity: '', weapon: '' };
        let cleaned = fullType.replace(/^StatTrak™\s*/, '').replace(/^★\s*/, '').replace(/^纪念品\s*/, '').trim();
        const parts = cleaned.split(/\s+/);
        if (parts.length === 0) return { rarity: '', weapon: '' };
        const weapon = parts[parts.length - 1];
        const rarity = parts.slice(0, -1).join(' ');
        if (parts.length === 1) return { rarity: '普通级', weapon: weapon };
        return { rarity: rarity || '普通级', weapon: weapon };
    }

    const descMap = {};
    inventoryData.descriptions.forEach(d => {
        descMap[`${d.classid}_${d.instanceid}`] = d;
    });

    const wearMap = {};
    inventoryData.asset_properties.forEach(ap => {
        const wearObj = ap.properties.find(p => p.name === "磨损率");
        if (wearObj) wearMap[ap.assetid] = wearObj.float_value;
    });

    // 收集所有稀有度和武器类型
    const raritySet = new Set();
    const weaponSet = new Set();
    inventoryData.assets.forEach(asset => {
        const detail = descMap[`${asset.classid}_${asset.instanceid}`];
        if (!detail || !detail.type) return;
        const { rarity, weapon } = parseType(detail.type);
        if (rarity) raritySet.add(rarity);
        if (weapon) weaponSet.add(weapon);
    });

    // 填充下拉列表
    const rarityDropdown = document.getElementById('rarity-filter');
    const weaponDropdown = document.getElementById('weapon-filter');
    [...raritySet].sort().forEach(r => {
        const opt = document.createElement('option');
        opt.value = r; opt.textContent = r;
        rarityDropdown.appendChild(opt);
    });
    [...weaponSet].sort().forEach(w => {
        const opt = document.createElement('option');
        opt.value = w; opt.textContent = w;
        weaponDropdown.appendChild(opt);
    });

    let mergeMode = false;
    rarityDropdown.addEventListener('change', () => renderInventory(mergeMode));
    weaponDropdown.addEventListener('change', () => renderInventory(mergeMode));

    function toggleMerge() {
        mergeMode = !mergeMode;
        renderInventory(mergeMode);
    }

    function getCurrentFilters() {
        return {
            rarity: rarityDropdown.value,
            weapon: weaponDropdown.value
        };
    }

    // 价格数据
    let priceMap = {};
    async function loadPrices() {
        try {
            const resp = await fetch('https://inventory.050820.xyz/price.json');
            if (!resp.ok) throw new Error('价格数据请求失败');
            const data = await resp.json();
            data.forEach(item => {
                priceMap[item.marketHashName] = item.yyypSellPrice;
            });
        } catch (e) {
            console.warn('价格数据加载失败，物品将不显示价格', e);
        }
        // 无论是否成功，都执行首次渲染
        renderInventory(false);
    }

    function renderInventory(merged) {
        const container = document.getElementById('inventory');
        container.innerHTML = '';
        let itemCount = 0;
        let totalValue = 0;
        const { rarity: filterRarity, weapon: filterWeapon } = getCurrentFilters();

        const filterAsset = (asset) => {
            const detail = descMap[`${asset.classid}_${asset.instanceid}`];
            if (!detail || !detail.type) return false;
            const { rarity, weapon } = parseType(detail.type);
            if (filterRarity && rarity !== filterRarity) return false;
            if (filterWeapon && weapon !== filterWeapon) return false;
            return true;
        };

        if (merged) {
            const groups = new Map();
            inventoryData.assets.forEach(asset => {
                if (!filterAsset(asset)) return;
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                const key = detail.market_hash_name;

                if (!groups.has(key)) {
                    groups.set(key, {
                        detail,
                        assets: [],
                        totalCount: 0
                    });
                }

                const group = groups.get(key);
                group.assets.push(asset);
                group.totalCount++;
            });

            groups.forEach((group, key) => {
                const detail = group.detail;
                const displayName =
                    detail.market_name ||
                    detail.name ||
                    detail.market_hash_name;
                const firstAsset = group.assets[0];
                const floatValue = wearMap[firstAsset.assetid];
                const wearLabel = floatValue ? getWearLabel(floatValue) : null;
                const fallbackWear = (!floatValue && !wearLabel) ? extractWearFromName(detail) : null;

                // 价格获取（使用第一个物品的 market_hash_name）
                const priceKey = detail.market_hash_name;
                const unitPrice = priceMap[priceKey] !== undefined ? priceMap[priceKey] : null;
                const groupTotalPrice = unitPrice !== null ? unitPrice * group.totalCount : null;
                if (groupTotalPrice !== null) totalValue += groupTotalPrice;

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${displayName}">
                    </div>
                    <div class="item-name" style="color:#${detail.name_color}"> ${displayName} ×${group.totalCount} </div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : (fallbackWear ? `<div class="wear-badge">${fallbackWear}</div>` : '<div class="wear-badge">无磨损数据</div>')}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : ''}
                        ${unitPrice !== null ? `<div class="price-val">单价 ¥${unitPrice.toFixed(2)} | 总价 ¥${groupTotalPrice.toFixed(2)}</div>` : '<div class="price-val">暂无价格</div>'}
                        <div class="tag-container">
                            <span class="tag">数量: ${group.totalCount}</span>
                            <span class="tag">AppID: ${firstAsset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                itemCount += group.totalCount;
            });
        } else {
            inventoryData.assets.forEach(asset => {
                if (!filterAsset(asset)) return;
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                itemCount++;
                const floatValue = wearMap[asset.assetid];
                const wearLabel = floatValue ? getWearLabel(floatValue) : null;
                const fallbackWear = (!floatValue && !wearLabel) ? extractWearFromName(detail) : null;

                const priceKey = detail.market_hash_name;
                const price = priceMap[priceKey] !== undefined ? priceMap[priceKey] : null;
                if (price !== null) totalValue += price;

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${detail.name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${detail.name}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : (fallbackWear ? `<div class="wear-badge">${fallbackWear}</div>` : '<div class="wear-badge">无磨损数据</div>')}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : ''}
                        ${price !== null ? `<div class="price-val">¥${price.toFixed(2)}</div>` : '<div class="price-val">暂无价格</div>'}
                        <div class="tag-container">
                            <span class="tag">ID: ${asset.assetid.slice(-6)}</span>
                            <span class="tag">AppID: ${asset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('stat-info').textContent = `共检测到 ${itemCount} 件饰品`;
        document.getElementById('total-value').textContent = `¥${totalValue.toFixed(2)}`;
    }

    // 启动时先加载价格，再渲染
    loadPrices();
</script>
