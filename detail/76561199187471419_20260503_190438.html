    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-blue: #2a475e;
            --steam-text: #c7d5e0;
            --rarity-rare: #4b69ff;    /* 军规级 */
            --rarity-mythical: #8847ff; /* 受限级 */
            --rarity-legendary: #d32ce6;/* 保密级 */
            --rarity-ancient: #eb4b4b;  /* 隐秘级 */
            --rarity-common: #b0c3d9;   /* 消费级 */
        }

        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--steam-dark);
            color: var(--steam-text);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--steam-blue);
            padding-bottom: 20px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .item-card {
            background: linear-gradient(135deg, #2a475e 0%, #16202d 100%);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }

        /* 顶部品质色条 */
        .rarity-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            border-radius: 4px 4px 0 0;
        }

        .item-img-container {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            margin-bottom: 10px;
        }

        .item-img {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .item-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }

        .item-type {
            font-size: 12px;
            color: #8b929a;
            margin-bottom: 10px;
        }

        .item-meta {
            margin-top: auto;
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }

        .wear-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 2px;
            background: rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .float-val {
            color: #57cbff;
            font-family: monospace;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
        }

        .tag {
            background: #3d4448;
            color: #fff;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 2px;
        }

        .merge-btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: #4b69ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .merge-btn:hover {
            background: #3a53cc;
        }
    </style>
</head>

        if (float < 0.15) return "略有磨损 (WearCategory1)";
        if (float < 0.38) return "久经沙场 (WearCategory2)";
        if (float < 0.45) return "破损不堪 (WearCategory3)";
        return "战痕累累 (WearCategory4)";
    }

    // 建立描述索引
    const descMap = {};
    inventoryData.descriptions.forEach(d => {
        descMap[`${d.classid}_${d.instanceid}`] = d;
    });

    // 建立磨损数值索引
    const wearMap = {};
    inventoryData.asset_properties.forEach(ap => {
        const wearObj = ap.properties.find(p => p.name === "磨损率");
        if (wearObj) wearMap[ap.assetid] = wearObj.float_value;
    });

    // 合并模式开关
    let mergeMode = false;

    // 切换合并模式
    function toggleMerge() {
        mergeMode = !mergeMode;
        renderInventory(mergeMode);
    }

    // 渲染库存
    function renderInventory(merged) {
        const container = document.getElementById('inventory');
        container.innerHTML = '';
        let itemCount = 0;

        if (merged) {
            // 按 market_hash_name 分组
            const groups = new Map();
            inventoryData.assets.forEach(asset => {
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                if (!detail) return;
                const name = detail.name;
                if (!groups.has(name)) {
                    groups.set(name, {
                        detail: detail,
                        assets: [],
                        totalCount: 0
                    });
                }
                const group = groups.get(name);
                group.assets.push(asset);
                group.totalCount++;
            });

            groups.forEach((group, name) => {
                const detail = group.detail;
                const firstAsset = group.assets[0];
                const floatValue = wearMap[firstAsset.assetid];
                const wearLabel = getWearLabel(floatValue);
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${name} ${'×' + group.totalCount}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : ''}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : '<div class="float-val">无磨损数据</div>'}
                        <div class="tag-container">
                            <span class="tag">数量: ${group.totalCount}</span>
                            <span class="tag">AppID: ${firstAsset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                itemCount += group.totalCount;
            });
        } else {
            // 默认逐个渲染
            inventoryData.assets.forEach(asset => {
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                if (!detail) return;
                itemCount++;
                const floatValue = wearMap[asset.assetid];
                const wearLabel = getWearLabel(floatValue);
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${detail.name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${detail.name}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : ''}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : '<div class="float-val">无磨损数据</div>'}
                        <div class="tag-container">
                            <span class="tag">ID: ${asset.assetid.slice(-6)}</span>
                            <span class="tag">AppID: ${asset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('stat-info').textContent = `共检测到 ${itemCount} 件饰品`;
    }

    // 初始渲染（不合并）
    renderInventory(false);
</script>
</body>
</html>
