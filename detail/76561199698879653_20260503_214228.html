    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-blue: #2a475e;
            --steam-text: #c7d5e0;
            --rarity-rare: #4b69ff;    /* 军规级 */
            --rarity-mythical: #8847ff; /* 受限级 */
            --rarity-legendary: #d32ce6;/* 保密级 */
            --rarity-ancient: #eb4b4b;  /* 隐秘级 */
            --rarity-common: #b0c3d9;   /* 消费级 */
        }

        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--steam-dark);
            color: var(--steam-text);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--steam-blue);
            padding-bottom: 20px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .item-card {
            background: linear-gradient(135deg, #2a475e 0%, #16202d 100%);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }

        /* 顶部品质色条 */
        .rarity-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            border-radius: 4px 4px 0 0;
        }

        .item-img-container {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            margin-bottom: 10px;
        }

        .item-img {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .item-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.4;
            height: 40px;
            overflow: hidden;
        }

        .item-type {
            font-size: 12px;
            color: #8b929a;
            margin-bottom: 10px;
        }

        .item-meta {
            margin-top: auto;
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }

        .wear-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 2px;
            background: rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .float-val {
            color: #57cbff;
            font-family: monospace;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
        }

        .tag {
            background: #3d4448;
            color: #fff;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 2px;
        }

        .merge-btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: #4b69ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .merge-btn:hover {
            background: #3a53cc;
        }
    </style>
</head>

"category": "Type", "internal_name": "CSGO_Type_SMG", "localized_category_name": "类型", "localized_tag_name": "微型冲锋枪"}, {"category": "Weapon", "internal_name": "weapon_mp9", "localized_category_name": "武器", "localized_tag_name": "MP9"}, {"category": "ItemSet", "internal_name": "set_community_5", "localized_category_name": "收藏品", "localized_tag_name": "先锋收藏品"}, {"category": "Quality", "internal_name": "normal", "localized_category_name": "类别", "localized_tag_name": "普通"}, {"category": "Rarity", "internal_name": "Rarity_Rare_Weapon", "localized_category_name": "品质", "localized_tag_name": "军规级", "color": "4b69ff"}, {"category": "Exterior", "internal_name": "WearCategory0", "localized_category_name": "外观", "localized_tag_name": "崭新出厂"}, {"category": "Tournament", "internal_name": "Tournament19", "localized_category_name": "锦标赛", "localized_tag_name": "2022 PGL 安特卫普"}], "sealed": 0, "market_bucket_group_name": "MP9 | 飞驰", "market_bucket_group_id": "G18222082033004", "sealed_type": 0}], "asset_properties": []};
    const IMG_BASE = "https://community.cloudflare.steamstatic.com/economy/image/";

    // 磨损等级判定（基于浮点数值）
    function getWearLabel(f) {
        const float = parseFloat(f);
        if (isNaN(float)) return null;
        if (float < 0.07) return "崭新出厂 (WearCategory0)";
        if (float < 0.15) return "略有磨损 (WearCategory1)";
        if (float < 0.38) return "久经沙场 (WearCategory2)";
        if (float < 0.45) return "破损不堪 (WearCategory3)";
        return "战痕累累 (WearCategory4)";
    }

    // 从 market_name 或 market_hash_name 提取磨损文本（如“崭新出厂”）
    function extractWearFromName(detail) {
        if (!detail) return null;
        // 优先使用中文 market_name，其次英文 market_hash_name
        const name = detail.market_name || detail.market_hash_name || '';
        // 匹配最后一个括号内容，例如 "(崭新出厂)" 或 "(Factory New)"
        const match = name.match(/\(([^)]+)\)$/);
        if (match && match[1]) {
            // 如果是英文磨损，可映射为中文（可按需扩展）
            const wearMapEN = {
                'Factory New': '崭新出厂',
                'Minimal Wear': '略有磨损',
                'Field-Tested': '久经沙场',
                'Well-Worn': '破损不堪',
                'Battle-Scarred': '战痕累累'
            };
            const raw = match[1].trim();
            // 中文括号内容直接返回，否则尝试映射
            if (/[\u4e00-\u9fa5]/.test(raw)) {
                return raw; // 如“崭新出厂”
            } else if (wearMapEN[raw]) {
                return wearMapEN[raw];
            }
            // 特殊处理带 StatTrak 的情况，如 "StatTrak™ 崭新出厂"
            const stMatch = name.match(/StatTrak™\s*(.*)/);
            if (stMatch) {
                return extractWearFromName({ market_name: stMatch[1] });
            }
        }
        return null;
    }

    // 建立描述索引
    const descMap = {};
    inventoryData.descriptions.forEach(d => {
        descMap[`${d.classid}_${d.instanceid}`] = d;
    });

    // 建立磨损数值索引
    const wearMap = {};
    inventoryData.asset_properties.forEach(ap => {
        const wearObj = ap.properties.find(p => p.name === "磨损率");
        if (wearObj) wearMap[ap.assetid] = wearObj.float_value;
    });

    let mergeMode = false;

    function toggleMerge() {
        mergeMode = !mergeMode;
        renderInventory(mergeMode);
    }

    function renderInventory(merged) {
        const container = document.getElementById('inventory');
        container.innerHTML = '';
        let itemCount = 0;

        if (merged) {
            const groups = new Map();
            inventoryData.assets.forEach(asset => {
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                if (!detail) return;
                const name = detail.name;
                if (!groups.has(name)) {
                    groups.set(name, {
                        detail: detail,
                        assets: [],
                        totalCount: 0
                    });
                }
                const group = groups.get(name);
                group.assets.push(asset);
                group.totalCount++;
            });

            groups.forEach((group, name) => {
                const detail = group.detail;
                const firstAsset = group.assets[0];
                const floatValue = wearMap[firstAsset.assetid];
                const wearLabel = floatValue ? getWearLabel(floatValue) : null;
                // 如果没有浮点数据，尝试从名称提取磨损
                const fallbackWear = (!floatValue && !wearLabel) ? extractWearFromName(detail) : null;

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${name} ${'×' + group.totalCount}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : (fallbackWear ? `<div class="wear-badge">${fallbackWear}</div>` : '<div class="wear-badge">无磨损数据</div>')}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : ''}
                        <div class="tag-container">
                            <span class="tag">数量: ${group.totalCount}</span>
                            <span class="tag">AppID: ${firstAsset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                itemCount += group.totalCount;
            });
        } else {
            inventoryData.assets.forEach(asset => {
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                if (!detail) return;
                itemCount++;
                const floatValue = wearMap[asset.assetid];
                const wearLabel = floatValue ? getWearLabel(floatValue) : null;
                const fallbackWear = (!floatValue && !wearLabel) ? extractWearFromName(detail) : null;

                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${detail.name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${detail.name}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : (fallbackWear ? `<div class="wear-badge">${fallbackWear}</div>` : '<div class="wear-badge">无磨损数据</div>')}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : ''}
                        <div class="tag-container">
                            <span class="tag">ID: ${asset.assetid.slice(-6)}</span>
                            <span class="tag">AppID: ${asset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('stat-info').textContent = `共检测到 ${itemCount} 件饰品`;
    }

    // 初始渲染
    renderInventory(false);
</script>
