<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam 库存快照 - 带饰品估值</title>
    <style>
        :root {
            --steam-dark: #1b2838;
            --steam-blue: #2a475e;
            --steam-text: #c7d5e0;
            --rarity-rare: #4b69ff;
            --rarity-mythical: #8847ff;
            --rarity-legendary: #d32ce6;
            --rarity-ancient: #eb4b4b;
            --rarity-common: #b0c3d9;
        }
        body {
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: var(--steam-dark);
            color: var(--steam-text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--steam-blue);
            padding-bottom: 20px;
        }
        .stats-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px 20px;
            margin: 15px auto;
            max-width: 500px;
            display: inline-block;
        }
        .total-price {
            font-size: 24px;
            font-weight: bold;
            color: #d2d500;
        }
        .price-status {
            font-size: 12px;
            color: #ffaa66;
            margin-top: 5px;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .item-card {
            background: linear-gradient(135deg, #2a475e 0%, #16202d 100%);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.2);
        }
        .rarity-bar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            border-radius: 4px 4px 0 0;
        }
        .item-img-container {
            height: 160px;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            margin-bottom: 10px;
        }
        .item-img {
            max-width: 100%; max-height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
        .item-name {
            font-size: 14px; font-weight: bold; margin-bottom: 5px;
            line-height: 1.4; height: 40px; overflow: hidden;
        }
        .item-type {
            font-size: 12px; color: #8b929a; margin-bottom: 10px;
        }
        .item-meta {
            margin-top: auto; font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;
        }
        .wear-badge {
            display: inline-block; padding: 2px 6px; border-radius: 2px;
            background: rgba(0,0,0,0.3); margin-bottom: 5px;
        }
        .float-val {
            color: #57cbff; font-family: monospace;
        }
        .price-info {
            color: #ffd966;
            font-weight: bold;
            margin-top: 4px;
        }
        .tag-container {
            display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px;
        }
        .tag {
            background: #3d4448; color: #fff; padding: 1px 4px;
            font-size: 10px; border-radius: 2px;
        }
        .merge-btn {
            margin: 5px; padding: 6px 12px;
            background: #4b69ff; color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 14px;
        }
        .merge-btn:hover { background: #3a53cc; }
        select {
            padding: 6px 12px; border-radius: 4px; border: none;
            background: #2a475e; color: white; font-size: 14px;
            margin: 0 4px;
        }
        label { font-size: 14px; margin: 0 2px; }
        .error-notice {
            background: rgba(220, 40, 40, 0.2);
            border-left: 4px solid #ff6666;
            padding: 8px 12px;
            margin: 10px auto;
            max-width: 600px;
            font-size: 13px;
        }
    </style>
</head>

    function extractWearFromName(detail) {
        if (!detail) return null;
        const name = detail.market_name || detail.market_hash_name || '';
        const match = name.match(/\(([^)]+)\)$/);
        if (match && match[1]) {
            const raw = match[1].trim();
            if (/[\u4e00-\u9fa5]/.test(raw)) return raw;
            const wearMapEN = {
                'Factory New': '崭新出厂',
                'Minimal Wear': '略有磨损',
                'Field-Tested': '久经沙场',
                'Well-Worn': '破损不堪',
                'Battle-Scarred': '战痕累累'
            };
            if (wearMapEN[raw]) return wearMapEN[raw];
            const stMatch = name.match(/StatTrak™\s*(.*)/);
            if (stMatch) return extractWearFromName({ market_name: stMatch[1] });
        }
        return null;
    }

    // 解析 "type" 字段为稀有度和武器类型
    function parseType(fullType) {
        if (!fullType) return { rarity: '', weapon: '' };
        let cleaned = fullType.replace(/^StatTrak™\s*/, '').replace(/^★\s*/, '').replace(/^纪念品\s*/, '').trim();
        const parts = cleaned.split(/\s+/);
        if (parts.length === 0) return { rarity: '', weapon: '' };
        const weapon = parts[parts.length - 1];
        const rarity = parts.slice(0, -1).join(' ');
        if (parts.length === 1) {
            return { rarity: '普通级', weapon: weapon };
        }
        return { rarity: rarity || '普通级', weapon: weapon };
    }

    // 构建描述映射
    const descMap = {};
    inventoryData.descriptions.forEach(d => {
        descMap[`${d.classid}_${d.instanceid}`] = d;
    });

    // 磨损率映射
    const wearMap = {};
    inventoryData.asset_properties.forEach(ap => {
        const wearObj = ap.properties.find(p => p.name === "磨损率");
        if (wearObj) wearMap[ap.assetid] = wearObj.float_value;
    });

    // 收集所有稀有度和武器类型用于下拉筛选
    const raritySet = new Set();
    const weaponSet = new Set();
    inventoryData.assets.forEach(asset => {
        const detail = descMap[`${asset.classid}_${asset.instanceid}`];
        if (!detail || !detail.type) return;
        const { rarity, weapon } = parseType(detail.type);
        if (rarity) raritySet.add(rarity);
        if (weapon) weaponSet.add(weapon);
    });

    const rarityDropdown = document.getElementById('rarity-filter');
    const weaponDropdown = document.getElementById('weapon-filter');
    [...raritySet].sort().forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        rarityDropdown.appendChild(opt);
    });
    [...weaponSet].sort().forEach(w => {
        const opt = document.createElement('option');
        opt.value = w;
        opt.textContent = w;
        weaponDropdown.appendChild(opt);
    });

    let mergeMode = false;
    rarityDropdown.addEventListener('change', () => renderInventory(mergeMode));
    weaponDropdown.addEventListener('change', () => renderInventory(mergeMode));

    function toggleMerge() {
        mergeMode = !mergeMode;
        renderInventory(mergeMode);
    }

    function getCurrentFilters() {
        return {
            rarity: rarityDropdown.value,
            weapon: weaponDropdown.value
        };
    }

    // ======================== 价格集成模块 ========================
    let priceData = [];           // 存储从 price.json 获取的数据
    let priceMap = new Map();     // key: market_hash_name, value: 价格
    let totalInventoryValue = 0;
    let isPriceLoaded = false;
    let priceFetchError = null;
    let currentItemsList = [];     // 存储当前筛选后的物品 (用于价格统计)

    // 获取价格数据 (支持重试、超时、CORS 友好)
    async function fetchPriceData() {
        const PRICE_URL = "https://inventory.050820.xyz/price.json";
        // 备用代理列表 (如果直接请求失败，尝试 CORS 代理)
        const PROXY_URLS = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(PRICE_URL)}`,
            `https://cors-anywhere.herokuapp.com/${PRICE_URL}`,
            `https://cors-proxy.htmr.workers.dev/?url=${encodeURIComponent(PRICE_URL)}`
        ];
        
        // 超时控制器
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        const fetchWithTimeout = (url, options = {}) => {
            return fetch(url, { ...options, signal: controller.signal });
        };
        
        // 尝试直接获取
        try {
            const response = await fetchWithTimeout(PRICE_URL);
            if (response.ok) {
                const data = await response.json();
                clearTimeout(timeoutId);
                return data;
            }
        } catch (err) {
            console.warn(`直连失败 (${err.message}), 尝试代理...`);
        }
        
        // 尝试代理列表
        for (const proxyUrl of PROXY_URLS) {
            try {
                const response = await fetchWithTimeout(proxyUrl);
                if (response.ok) {
                    const text = await response.text();
                    // 某些代理可能返回包装数据，需要提取真正的 JSON
                    let jsonData;
                    try {
                        jsonData = JSON.parse(text);
                    } catch (e) {
                        // 如果 text 外层还有 escape，尝试提取
                        const match = text.match(/^[\s\S]*?(\[.*\])[\s\S]*$/);
                        if (match && match[1]) {
                            jsonData = JSON.parse(match[1]);
                        } else {
                            throw new Error("无法解析JSON结构");
                        }
                    }
                    clearTimeout(timeoutId);
                    return jsonData;
                }
            } catch (err) {
                console.warn(`代理 ${proxyUrl} 失败: ${err.message}`);
            }
        }
        
        clearTimeout(timeoutId);
        throw new Error("所有价格源均不可用，请检查网络或稍后刷新");
    }

    // 构建 market_hash_name -> price 映射
    function buildPriceMap(priceArray) {
        const map = new Map();
        if (!Array.isArray(priceArray)) return map;
        for (const item of priceArray) {
            if (item.marketHashName && typeof item.yyypSellPrice === 'number') {
                // 标准化 market_hash_name (去除前后空格，并保留原始大小写用于匹配)
                const key = item.marketHashName.trim();
                map.set(key, item.yyypSellPrice);
            }
        }
        return map;
    }

    // 获取某个物品的单价 (通过 market_hash_name)
    function getItemPrice(detail, asset) {
        if (!isPriceLoaded || priceMap.size === 0) return null;
        // 优先使用 market_hash_name (最准确)
        let marketName = detail?.market_hash_name || detail?.market_name || detail?.name;
        if (!marketName) return null;
        
        // 直接匹配
        if (priceMap.has(marketName)) {
            return priceMap.get(marketName);
        }
        
        // 尝试去除 StatTrak 前缀再进行匹配 (有些价格库不带 StatTrak™)
        let cleanName = marketName.replace(/^StatTrak™\s*/, '').trim();
        if (cleanName !== marketName && priceMap.has(cleanName)) {
            return priceMap.get(cleanName);
        }
        
        // 尝试去除 ★ 符号
        cleanName = cleanName.replace(/^★\s*/, '').trim();
        if (priceMap.has(cleanName)) {
            return priceMap.get(cleanName);
        }
        return null;
    }

    // 计算总价值并更新显示，同时将价格附加到 DOM 展示
    function updateTotalPriceAndRender() {
        // 收集当前显示的物品 (已过滤后的 assets，可能合并或单独)
        let itemsToCount = [];
        const { rarity: filterRarity, weapon: filterWeapon } = getCurrentFilters();
        
        // 辅助判断是否通过筛选
        function isAssetFiltered(asset) {
            const detail = descMap[`${asset.classid}_${asset.instanceid}`];
            if (!detail || !detail.type) return false;
            const { rarity, weapon } = parseType(detail.type);
            if (filterRarity && rarity !== filterRarity) return false;
            if (filterWeapon && weapon !== filterWeapon) return false;
            return true;
        }
        
        if (mergeMode) {
            // 合并模式下，统计 groups 的数量 (未合并前先收集)
            const groups = new Map();
            inventoryData.assets.forEach(asset => {
                if (!isAssetFiltered(asset)) return;
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                const name = detail.name;
                if (!groups.has(name)) {
                    groups.set(name, { detail, assets: [], totalCount: 0 });
                }
                const group = groups.get(name);
                group.assets.push(asset);
                group.totalCount++;
            });
            // 将每个 group 视为一个聚合项 (计入总价按数量×单价)
            groups.forEach(group => {
                const detail = group.detail;
                const sampleAsset = group.assets[0];
                const price = getItemPrice(detail, sampleAsset);
                if (price && typeof price === 'number') {
                    const groupValue = price * group.totalCount;
                    itemsToCount.push({ value: groupValue, count: group.totalCount, price: price });
                } else {
                    itemsToCount.push({ value: 0, count: group.totalCount, price: null });
                }
            });
        } else {
            // 单独模式下每个 asset 单独统计
            inventoryData.assets.forEach(asset => {
                if (!isAssetFiltered(asset)) return;
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                const price = getItemPrice(detail, asset);
                if (price && typeof price === 'number') {
                    itemsToCount.push({ value: price, count: 1, price: price });
                } else {
                    itemsToCount.push({ value: 0, count: 1, price: null });
                }
            });
        }
        
        const totalValue = itemsToCount.reduce((sum, item) => sum + item.value, 0);
        totalInventoryValue = totalValue;
        const totalPriceFormatted = totalValue.toFixed(2);
        document.getElementById('total-price-display').innerHTML = `¥ ${totalPriceFormatted}`;
        
        // 状态提示
        const priceStatusDiv = document.getElementById('price-source-status');
        if (!isPriceLoaded) {
            if (priceFetchError) {
                priceStatusDiv.innerHTML = `⚠️ 价格加载失败: ${priceFetchError}，总价无法计算`;
            } else {
                priceStatusDiv.innerHTML = `⏳ 正在获取最新价格...`;
            }
        } else {
            const matchedCount = itemsToCount.filter(item => item.price !== null).length;
            const totalItemsCount = itemsToCount.length;
            priceStatusDiv.innerHTML = `✅ 已匹配 ${matchedCount}/${totalItemsCount} 种物品，总计值参考 YYyp`;
        }
        
        // 重新渲染 DOM 以便每张卡片显示价格 (保证信息一致)
        renderInventory(mergeMode);
    }
    
    // 增强原始 renderInventory 以展示价格信息
    const originalRender = renderInventory;
    window.renderInventory = function(merged) {
        const container = document.getElementById('inventory');
        container.innerHTML = '';
        let itemCount = 0;
        const { rarity: filterRarity, weapon: filterWeapon } = getCurrentFilters();
        
        const filterAsset = (asset) => {
            const detail = descMap[`${asset.classid}_${asset.instanceid}`];
            if (!detail || !detail.type) return false;
            const { rarity, weapon } = parseType(detail.type);
            if (filterRarity && rarity !== filterRarity) return false;
            if (filterWeapon && weapon !== filterWeapon) return false;
            return true;
        };
        
        if (merged) {
            const groups = new Map();
            inventoryData.assets.forEach(asset => {
                if (!filterAsset(asset)) return;
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                const name = detail.name;
                if (!groups.has(name)) {
                    groups.set(name, { detail, assets: [], totalCount: 0 });
                }
                const group = groups.get(name);
                group.assets.push(asset);
                group.totalCount++;
            });
            
            groups.forEach((group, name) => {
                const detail = group.detail;
                const firstAsset = group.assets[0];
                const floatValue = wearMap[firstAsset.assetid];
                const wearLabel = floatValue ? getWearLabel(floatValue) : null;
                const fallbackWear = (!floatValue && !wearLabel) ? extractWearFromName(detail) : null;
                const itemPrice = getItemPrice(detail, firstAsset);
                const groupValue = itemPrice ? (itemPrice * group.totalCount).toFixed(2) : null;
                
                const card = document.createElement('div');
                card.className = 'item-card';
                let priceHtml = '';
                if (isPriceLoaded && priceMap.size > 0) {
                    if (itemPrice !== null) {
                        priceHtml = `<div class="price-info">💰 单价: ¥${itemPrice.toFixed(2)} | 总价值: ¥${groupValue}</div>`;
                    } else {
                        priceHtml = `<div class="price-info" style="color:#a0a0a0;">💰 暂无匹配价格</div>`;
                    }
                } else if (priceFetchError) {
                    priceHtml = `<div class="price-info" style="color:#ff8866;">⚠️ 价格数据不可用</div>`;
                } else if (!isPriceLoaded) {
                    priceHtml = `<div class="price-info">⏳ 价格加载中...</div>`;
                }
                
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${name} ${'×' + group.totalCount}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : (fallbackWear ? `<div class="wear-badge">${fallbackWear}</div>` : '<div class="wear-badge">无磨损数据</div>')}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : ''}
                        ${priceHtml}
                        <div class="tag-container">
                            <span class="tag">数量: ${group.totalCount}</span>
                            <span class="tag">AppID: ${firstAsset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                itemCount += group.totalCount;
            });
        } else {
            inventoryData.assets.forEach(asset => {
                if (!filterAsset(asset)) return;
                const detail = descMap[`${asset.classid}_${asset.instanceid}`];
                itemCount++;
                const floatValue = wearMap[asset.assetid];
                const wearLabel = floatValue ? getWearLabel(floatValue) : null;
                const fallbackWear = (!floatValue && !wearLabel) ? extractWearFromName(detail) : null;
                const itemPrice = getItemPrice(detail, asset);
                
                let priceHtml = '';
                if (isPriceLoaded && priceMap.size > 0) {
                    if (itemPrice !== null) {
                        priceHtml = `<div class="price-info">💰 估价: ¥${itemPrice.toFixed(2)}</div>`;
                    } else {
                        priceHtml = `<div class="price-info" style="color:#a0a0a0;">💰 暂无匹配价格</div>`;
                    }
                } else if (priceFetchError) {
                    priceHtml = `<div class="price-info" style="color:#ff8866;">⚠️ 价格数据不可用</div>`;
                } else if (!isPriceLoaded) {
                    priceHtml = `<div class="price-info">⏳ 价格加载中...</div>`;
                }
                
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="rarity-bar" style="background-color: #${detail.name_color}"></div>
                    <div class="item-img-container">
                        <img class="item-img" src="${IMG_BASE}${detail.icon_url}" alt="${detail.name}">
                    </div>
                    <div class="item-name" style="color: #${detail.name_color}">${detail.name}</div>
                    <div class="item-type">${detail.type}</div>
                    <div class="item-meta">
                        ${wearLabel ? `<div class="wear-badge">${wearLabel}</div>` : (fallbackWear ? `<div class="wear-badge">${fallbackWear}</div>` : '<div class="wear-badge">无磨损数据</div>')}
                        ${floatValue ? `<div class="float-val">Float: ${floatValue}</div>` : ''}
                        ${priceHtml}
                        <div class="tag-container">
                            <span class="tag">ID: ${asset.assetid.slice(-6)}</span>
                            <span class="tag">AppID: ${asset.appid}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                itemCount++;
            });
        }
        
        document.getElementById('stat-info').textContent = `共检测到 ${itemCount} 件饰品`;
    };
    
    // 重写全局 render 引用
    window.renderInventory = window.renderInventory.bind(window);
    window.renderInventory(mergeMode);
    
    // 价格加载异步流程
    async function initPriceSystem() {
        try {
            const rawPriceArray = await fetchPriceData();
            priceData = rawPriceArray;
            priceMap = buildPriceMap(priceData);
            isPriceLoaded = true;
            priceFetchError = null;
            console.log(`价格数据加载成功，共 ${priceMap.size} 条价格记录`);
        } catch (err) {
            isPriceLoaded = false;
            priceFetchError = err.message || "无法获取价格数据";
            console.error("价格加载失败:", priceFetchError);
        } finally {
            // 无论成功与否都要刷新页面价格显示
            updateTotalPriceAndRender();
        }
    }
    
    // 初始化，将重写的 render 绑定到原作用域上
    window.originalRenderRef = renderInventory;
    renderInventory = function(merged) {
        window.renderInventory(merged);
    };
    window.toggleMerge = toggleMerge;
    
    // 初始渲染并开启价格获取
    renderInventory(false);
    initPriceSystem();
    
    // 监听筛选器变化，重新计算总价和渲染 (同时更新价格显示)
    const originalRarityEvent = rarityDropdown.onchange;
    const originalWeaponEvent = weaponDropdown.onchange;
    rarityDropdown.addEventListener('change', () => {
        updateTotalPriceAndRender();
    });
    weaponDropdown.addEventListener('change', () => {
        updateTotalPriceAndRender();
    });
    
    // 重写合并模式的切换函数，确保价格更新
    window.toggleMerge = function() {
        mergeMode = !mergeMode;
        updateTotalPriceAndRender();
    };
    
    // 手动暴露用于调试
    window.inventoryPriceSystem = { priceMap, totalInventoryValue };
</script>
</body>
</html>
